name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  GO_VERSION: "1.26.0"
  NODE_VERSION: "20"

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download backend dependencies
        working-directory: ./backend
        run: go mod download

      - name: Build backend binaries
        working-directory: ./backend
        run: |
          go build ./cmd/server
          go build ./cmd/cleanup

      - name: Run targeted backend tests
        working-directory: ./backend
        run: go test ./internal/crypto ./internal/validation ./internal/middleware

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test backend image build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false

      - name: Test cleanup image build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.cleanup
          push: false

      - name: Test frontend image build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
